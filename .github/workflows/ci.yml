name: Plugin CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check src/ --output-format=github

      - name: Format check
        run: ruff format src/ --check

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          source .venv/bin/activate
          python -m pytest tests/ \
            --ignore=tests/integration \
            -x \
            --tb=short \
            -v \
            --junitxml=test-results.xml \
            2>&1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate all Python files compile
        run: |
          ERRORS=0
          while IFS= read -r -d '' f; do
            python3 -c "import ast; ast.parse(open('$f').read())" 2>/dev/null || {
              echo "❌ Syntax error: $f"
              ((ERRORS++))
            }
          done < <(find src/ -name '*.py' -print0)

          if [ "$ERRORS" -gt 0 ]; then
            echo "❌ ${ERRORS} file(s) have syntax errors"
            exit 1
          fi
          echo "✅ All Python files have valid syntax"

      - name: Check pyproject.toml is valid
        run: python3 -c "import tomllib; tomllib.load(open('pyproject.toml','rb'))"

  integration:
    # End-to-end test against a real nomad-lab install: loads every entry
    # point, parses the cavity fixture, and runs the normalizer on it.
    # Heavier than the unit test job (nomad-lab is a large pip install),
    # so it gates only the integration tests, not the whole suite.
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip wheels
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-integration-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-integration-

      - name: Install nomad-lab + plugin
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary "nomad-lab>=1.3.0"
          pip install -e ".[dev]"

      - name: Run integration smoke tests
        run: |
          python -m pytest tests/integration \
            --tb=short \
            -v \
            --junitxml=integration-results.xml

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: integration-results.xml
