name: Plugin CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check src/ --output-format=github

      - name: Format check
        run: ruff format src/ --check

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run tests
        run: |
          source .venv/bin/activate
          python -m pytest tests/ \
            -x \
            --tb=short \
            -v \
            --junitxml=test-results.xml \
            2>&1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate all Python files compile
        run: |
          ERRORS=0
          while IFS= read -r -d '' f; do
            python3 -c "import ast; ast.parse(open('$f').read())" 2>/dev/null || {
              echo "❌ Syntax error: $f"
              ((ERRORS++))
            }
          done < <(find src/ -name '*.py' -print0)

          if [ "$ERRORS" -gt 0 ]; then
            echo "❌ ${ERRORS} file(s) have syntax errors"
            exit 1
          fi
          echo "✅ All Python files have valid syntax"

      - name: Check pyproject.toml is valid
        run: python3 -c "import tomllib; tomllib.load(open('pyproject.toml','rb'))"
